{% extends 'base.html' %} {% block content %}
<section class="auth-shell">
  <div class="auth-card">
    <div class="auth-intro">
      <span class="eyebrow">Account help</span>
      <h1>Choose new password</h1>
      <p>Use at least 8 characters. Your reset code can only be used once.</p>
    </div>
    <form action="" method="post" class="stacked-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <label for="password">New password</label>
      <input id="password" type="password" name="password" required autocomplete="new-password" />
      <label for="confirm_password">Confirm password</label>
      <input id="confirm_password" type="password" name="confirm_password" required autocomplete="new-password" />
      <button class="button full-width" type="submit">Reset password</button>
    </form>
  </div>
</section>
{% endblock %}
