{% extends 'base.html' %} {% block content %}
<section class="card form-card">
  <h2>Settings</h2>
  <form action="" method="post">
    <label>
      <input
        type="checkbox"
        name="notifications_enabled"
        {%
        if
        current_user.profile.notifications_enabled
        %}checked{%
        endif
        %}
      />
      Enable notifications
    </label>
    <button class="button" type="submit">Save settings</button>
  </form>
  <section class="device-notification-panel">
    <h3>Device notifications</h3>
    <p class="muted-meta">
      Turn this on to receive supported browser notifications from this device.
    </p>
    <div class="settings-actions">
      <button class="button secondary" type="button" data-push-enable>Enable on this device</button>
      <button class="text-button danger-text" type="button" data-push-disable>Disable this device</button>
    </div>
    <p class="muted-meta" data-push-status></p>
  </section>
  <section class="danger-zone">
    <h3>Delete account</h3>
    <p>Type DELETE to remove your account permanently.</p>
    <form action="{{ url_for('main.delete_account') }}" method="post">
      <input type="text" name="confirm" placeholder="DELETE" required />
      <button class="button secondary" type="submit">Delete Account</button>
    </form>
  </section>
</section>
{% endblock %}
