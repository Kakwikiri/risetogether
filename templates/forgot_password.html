{% extends 'base.html' %} {% block content %}
<section class="auth-shell">
  <div class="auth-card">
    <div class="auth-intro">
      <span class="eyebrow">Account help</span>
      <h1>Reset password</h1>
      <p>Enter your email address to prepare a password reset link.</p>
    </div>
    <form action="" method="post" class="stacked-form">
      <label for="email">Username or email</label>
      <input id="email" type="text" name="email" required autocomplete="username" />
      <label for="reset_phrase">Reset word</label>
      <input id="reset_phrase" type="password" name="reset_phrase" placeholder="Your private reset word" />
      <button class="button full-width" type="submit">Request reset</button>
    </form>
    {% if reset_url %}
    <p class="dev-reset-link">
      Local reset link:
      <a href="{{ reset_url }}">{{ reset_url }}</a>
    </p>
    {% endif %}
  </div>
</section>
{% endblock %}
