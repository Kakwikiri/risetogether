{% extends 'base.html' %} {% block content %}
<section class="auth-shell">
  <div class="auth-card">
    <div class="auth-intro">
      <span class="eyebrow">Account help</span>
      <h1>Reset password</h1>
      <p>Enter your registered email address. We will send a secure one-time code.</p>
    </div>
    <form action="" method="post" class="stacked-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <label for="email">Email address</label>
      <input id="email" type="email" name="email" required autocomplete="email" />
      <button class="button full-width" type="submit">Send reset code</button>
    </form>
    <p class="auth-switch">
      <a href="{{ url_for('auth.login') }}">Back to login</a>
    </p>
  </div>
</section>
{% endblock %}
