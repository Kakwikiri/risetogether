<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <title>RiseTogether Offline</title>
    <style>
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 1rem;
        color: #14332e;
        background: #f2f6fb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(100%, 28rem);
        padding: 1.25rem;
        background: white;
        border: 1px solid #d8e3df;
        border-radius: 8px;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.6rem;
      }
      p {
        color: #5b6f6a;
        line-height: 1.5;
      }
      a {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        padding: 0 1rem;
        color: white;
        background: #0f766e;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>Reconnect to load your latest feed, messages, notifications, and Family activity.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
