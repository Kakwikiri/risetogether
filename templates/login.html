{% extends 'base.html' %} {% block content %}
<section class="auth-shell">
  <div class="auth-card">
    <div class="auth-intro">
      <span class="eyebrow">RiseTogether</span>
      <h1>Welcome back</h1>
      <p>Inspire someone. Get inspired. Continue sharing support and hope.</p>
    </div>
    <form action="" method="post" class="stacked-form">
      <label for="email">Username or email</label>
      <input id="email" type="text" name="email" required autocomplete="username" />
      <label for="password">Password</label>
      <div class="password-field">
        <input
          id="password"
          type="password"
          name="password"
          required
          autocomplete="current-password"
        />
        <button type="button" class="password-toggle" aria-label="Show password">
          Show
        </button>
      </div>
      <button class="button full-width" type="submit">Login</button>
    </form>
    <a class="button secondary full-width google-button" href="{{ url_for('auth.google_login') }}">
      Continue with Google
    </a>
    <p class="auth-switch">
      <a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a>
    </p>
    <p class="auth-switch">
      New to RiseTogether?
      <a href="{{ url_for('auth.signup') }}">Create an account</a>.
    </p>
  </div>
</section>
{% endblock %}
