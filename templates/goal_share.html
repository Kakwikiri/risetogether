{% extends 'base.html' %} {% block content %}<section class="card form-card"><p class="eyebrow">Goal achieved</p><h1>Share this achievement?</h1><p>{{ goal.title }}</p><form method="post" class="checkin-form"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}">{% if goal.scope == 'family' %}<button class="button" name="audience" value="family">Share inside {{ goal.family.name }}</button>{% endif %}<button class="button secondary" name="audience" value="public">Share publicly</button><button class="text-button" name="audience" value="private">Keep private</button></form><p class="muted-meta">Nothing is shared unless you choose it.</p></section>{% endblock %}
